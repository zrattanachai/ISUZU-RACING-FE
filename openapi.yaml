        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /race-control/thresholds:
    get:
      tags:
        - Race Control
      summary: Get race control alert thresholds
      description: Returns the threshold definitions used by Race Control sensor cards.
      operationId: getRaceControlThresholds
      responses:
        '200':
          description: Alert thresholds returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertThresholdsResponse'
              examples:
                default:
                  value:
                    thresholds:
                      - id: engineTemp
                        metric: engineTemp
                        label: Engine Temp
                        unit: °C
                        warningValue: 100
                        criticalValue: 110
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Race Control
      summary: Update race control alert thresholds
      description: Replaces the full Race Control alert threshold set.
      operationId: updateRaceControlThresholds
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertThresholdsUpdateRequest'
            examples:
              default:
                value:
                  thresholds:
                    - id: engineTemp
                      metric: engineTemp
                      label: Engine Temp
                      unit: °C
                      warningValue: 100
                      criticalValue: 110
      responses:
        '200':
          description: Thresholds updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WriteSuccessResponse'
              examples:
                default:
                  value:
                    saved: true
                    updatedAt: '2026-04-07T09:31:00Z'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /race-control/refresh-rate:
    get:
      tags:
        - Race Control
      summary: Get race control refresh rate
      description: Returns the configured telemetry refresh rate for Race Control.
      operationId: getRaceControlRefreshRate
      responses:
        '200':
          description: Current refresh rate returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectorRefreshRateResponse'
              examples:
                default:
                  value:
                    refreshRateHz: 5
                    updatedAt: '2026-04-07T09:30:00Z'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Race Control
      summary: Update race control refresh rate
      description: Updates the telemetry refresh rate used by Race Control.
      operationId: updateRaceControlRefreshRate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DirectorRefreshRateUpdateRequest'
            examples:
              default:
                value:
                  refreshRateHz: 10
      responses:
        '200':
          description: Refresh rate updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectorRefreshRateWriteResponse'
              examples:
                default:
                  value:
                    saved: true
                    refreshRateHz: 10
                    updatedAt: '2026-04-07T09:31:00Z'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /cars/{carId}/alerts:
    get:
      tags:
        - Race Control
      summary: Get active alerts
      description: Returns alerts for a selected vehicle.
      operationId: getCarAlerts
      parameters:
        - $ref: '#/components/parameters/CarIdPath'
        - name: state
          in: query
          required: false
          description: Filter alerts by state.
          schema:
            type: string
            enum:
              - active
              - acknowledged
              - all
            default: active
      responses:
        '200':
          description: Alerts returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertsResponse'
              examples:
                default:
                  value:
                    alerts:
                      - id: alert-1
                        message: Front Left Brake Temp High
                        severity: warning
                        time: '2026-03-16T10:42:01Z'
                        acknowledged: false
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /cars/{carId}/alerts/acknowledge:
    post:
      tags:
        - Race Control
      summary: Acknowledge alerts
      description: Acknowledges one or more active alerts for a vehicle.
      operationId: acknowledgeAlerts
      parameters:
        - $ref: '#/components/parameters/CarIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcknowledgeAlertsRequest'
            examples:
              default:
                value:
                  alertIds:
                    - alert-1
                    - alert-2
      responses:
        '200':
          description: Alerts acknowledged successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcknowledgeAlertsResponse'
              examples:
                default:
                  value:
                    acknowledgedAlertIds:
                      - alert-1
                      - alert-2
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /users/{userId}/preferences/race-control-layout:
    get:
      tags:
        - Preferences
      summary: Get race control layout preferences
      description: Returns the saved main layout and per-category sensor layouts for a user.
      operationId: getRaceControlLayout
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: Race control layout preferences returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RaceControlLayoutRequest'
              examples:
                default:
                  value:
                    mainLayout:
                      - i: sensors
                        x: 0
                        y: 0
                        w: 9
                        h: 5
                    sensorLayouts:
                      POWERTRAIN:
                        - i: '0'
                          x: 0
                          y: 0
                          w: 4
                          h: 2
                    theme:
                      primary: '#ffffff'
                      accent: '#ff3333'
                      accentGlow: 'rgba(255,51,51,0.4)'
                      brandGradientEnd: '#ffffff'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Preferences
      summary: Save race control layout preferences
      description: Persists the main layout and per-category sensor layouts for a user.
      operationId: updateRaceControlLayout
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RaceControlLayoutRequest'
            examples:
              default:
                value:
                  mainLayout:
                    - i: sensors
                      x: 0
                      y: 0
                      w: 9
                      h: 5
                  sensorLayouts:
                    POWERTRAIN:
                      - i: '0'
                        x: 0
                        y: 0
                        w: 4
                        h: 2
                  theme:
                    primary: '#ffffff'
                    accent: '#ff3333'
                    accentGlow: 'rgba(255,51,51,0.4)'
                    brandGradientEnd: '#ffffff'
      responses:
        '200':
          description: Layout preferences saved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RaceControlLayoutResponse'
              examples:
                default:
                  value:
                    saved: true
                    updatedAt: '2026-04-12T10:00:00Z'
                    theme:
                      primary: '#ffffff'
                      accent: '#ff3333'
                      accentGlow: 'rgba(255,51,51,0.4)'
                      brandGradientEnd: '#ffffff'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /users/{userId}/preferences/engineering-layout:
