  # -------------------------------------------------------------------------
  # Live Stream
  # -------------------------------------------------------------------------
  /vehicles/{vehicleId}/stream:
    get:
      tags:
        - Live Stream
      summary: Get vehicle stream URL
      description: Returns the HTTP(S) stream URL for the onboard camera of a vehicle.
      operationId: getVehicleStreamUrl
      parameters:
        - $ref: '#/components/parameters/VehicleIdPath'
        - name: camera
          in: query
          required: false
          description: Camera angle to resolve for the requested vehicle.
          schema:
            type: string
            enum: [FRONT, COCKPIT, REAR]
      responses:
        '200':
          description: Stream URL returned.
          content:
            application/json:
              schema:
                type: object
                required:
                  - vehicleId
                  - camera
                  - streamUrl
                properties:
                  vehicleId:
                    type: integer
                  camera:
                    type: string
                    enum: [FRONT, COCKPIT, REAR]
                  streamUrl:
                    type: string
                    format: uri
                  streamMimeType:
                    type: string
              examples:
                default:
                  value:
                    vehicleId: 12
                    camera: FRONT
                    streamUrl: https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4
                    streamMimeType: video/mp4
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # -------------------------------------------------------------------------
  # Auth
  # -------------------------------------------------------------------------
  /auth/me:
    get:
      tags:
        - Auth
      summary: Get authenticated user session
      description: |
        Validates the bearer token and returns the normalized user account plus
        the decoded JWT claims that the frontend must check before enabling
        privileged UI. Tokens are re-issued with a fresh expiry when the mock
        server restarts.
      operationId: getAuthenticatedSession
      responses:
        '200':
          description: Authenticated session returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
              examples:
                admin:
                  summary: Admin session
                  value:
                    authenticated: true
                    user:
                      id: user-admin-1
                      name: Platform Administrator
                      email: admin@isuzu.com
                      role: ADMIN
                      access: Admin
                      permissions:
                        raceControl: true
                        engineering: true
                        administration: true
                        directorThresholds: true
                    claims:
                      sub: user-admin-1
                      name: Platform Administrator
                      email: admin@isuzu.com
                      role: ADMIN
                      access: Admin
                      permissions:
                        raceControl: true
                        engineering: true
                        administration: true
                        directorThresholds: true
                      iat: 1775495622
                      exp: 1775499222
                      iss: isuzu-racing-mock-auth
                      aud: racing-platform-fe
                    landingPage: /administration
                director:
                  summary: Director session
                  value:
                    authenticated: true
                    user:
                      id: user-director-1
                      name: Race Director
                      email: director@isuzu.com
                      role: DIRECTOR
                      access: Director
                      permissions:
                        raceControl: true
                        engineering: true
                        administration: false
                        directorThresholds: true
                    claims:
