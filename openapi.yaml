components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Send a bearer token in the `Authorization` header.

        Example header values for backend integration:
        - `Bearer {{JwtAdminBearerToken}}`
        - `Bearer {{JwtDirectorBearerToken}}`
        - `Bearer {{JwtEngineerBearerToken}}`

        Expected claims are documented by `JwtClaims` and `/auth/me`.

  parameters:
    CarIdPath:
      name: carId
      in: path
      required: true
      description: Numeric vehicle identifier.
      schema:
        type: integer
        minimum: 1
      example: 12
    VehicleIdPath:
      name: vehicleId
      in: path
      required: true
      description: Numeric vehicle identifier.
      schema:
        type: integer
        minimum: 1
      example: 12
    UserIdPath:
      name: userId
      in: path
      required: true
      description: User identifier.
      schema:
        type: string
      example: engineer-12
    ResourceIdPath:
      name: id
      in: path
      required: true
      description: String resource identifier.
      schema:
        type: string
      example: event-001

  responses:
    ValidationError:
      description: The request was invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            default:
              value:
                error:
                  code: VALIDATION_FAILED
                  message: Invalid car ID parameter.
                  details:
                    field: carId
    UnauthorizedError:
      description: Authentication is required or the session is invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            default:
              value:
                error:
                  code: UNAUTHORIZED
                  message: Authentication required.
    NotFoundError:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            default:
              value:
                error:
                  code: NOT_FOUND
                  message: Requested resource was not found.
    InternalServerError:
      description: Unexpected backend failure.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            default:
              value:
                error:
                  code: INTERNAL_SERVER_ERROR
                  message: Unexpected backend failure.

  examples:
    JwtAdminBearerToken:
      summary: Example Authorization header payload for an Admin user
      value: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..signature-admin
    JwtDirectorBearerToken:
      summary: Example Authorization header payload for a Director user
      value: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..signature-director
    JwtEngineerBearerToken:
      summary: Example Authorization header payload for an Engineer user
      value: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..signature-engineer

  schemas:
    UserRole:
      type: string
      description: System authorization role used by the backend.
      enum:
        - ADMIN
        - DIRECTOR
        - ENGINEER
        - COMPETITOR

    UserPermissions:
      type: object
      description: Expanded permissions derived from the assigned role.
      required:
        - raceControl
        - engineering
        - administration
        - directorThresholds
      properties:
        raceControl:
          type: boolean
          description: Access to Race Control and related dashboards.
        engineering:
          type: boolean
          description: Access to Engineering dashboards and telemetry tooling.
        administration:
          type: boolean
          description: Access to Command Center user, garage, and vehicle management.
        directorThresholds:
          type: boolean
          description: Access to director threshold configuration.

    JwtClaims:
      type: object
      required:
        - sub
        - name
        - email
        - role
        - access
        - permissions
        - iat
        - exp
        - iss
        - aud
      properties:
        sub:
          type: string
          description: Stable user identifier.
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        access:
          $ref: '#/components/schemas/MockAccessLevel'
        assignedCarIds:
          type: array
          description: Vehicle ids assigned to scoped roles such as Engineer or Competitor.
          items:
            type: integer
        permissions:
          $ref: '#/components/schemas/UserPermissions'
        iat:
          type: integer
          format: int64
          description: Issued-at UNIX timestamp in seconds.
        exp:
          type: integer
          format: int64
          description: Expiry UNIX timestamp in seconds.
        iss:
          type: string
          description: Token issuer.
        aud:
          type: string
          description: Token audience.

    AuthSessionResponse:
      type: object
      required:
        - authenticated
        - user
        - claims
        - landingPage
      properties:
        authenticated:
          type: boolean
          const: true
        user:
          $ref: '#/components/schemas/MockAuthenticatedUser'
        claims:
          $ref: '#/components/schemas/JwtClaims'
        landingPage:
          type: string

    MockAccessLevel:
      type: string
      enum:
        - Admin
        - Director
        - Engineer
        - Competitor

    MockLoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    MockAuthenticatedUser:
      type: object
      required:
        - id
        - name
        - role
        - email
        - access
        - permissions
      properties:
        id:
          type: string
        name:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        email:
          type: string
          format: email
        access:
          $ref: '#/components/schemas/MockAccessLevel'
        assignedCarIds:
          type: array
          description: Vehicle ids assigned to scoped roles such as Engineer or Competitor.
          items:
            type: integer
        permissions:
          $ref: '#/components/schemas/UserPermissions'

    MockLoginResponse:
      type: object
      required:
        - authenticated
        - accessToken
        - tokenType
        - expiresAt
        - user
        - landingPage
      properties:
        authenticated:
          type: boolean
          const: true
        accessToken:
          type: string
          description: JWT signed by the current mock server process.
        tokenType:
          type: string
          enum:
            - Bearer
        expiresAt:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/MockAuthenticatedUser'
        landingPage:
          type: string

    MockLoginFailureResponse:
      type: object
      required:
        - authenticated
        - error
      properties:
        authenticated:
          type: boolean
          const: false
        error:
          type: string

    DirectorThresholdMetric:
      type: object
      required:
        - threshold
        - alertDelay
        - warningPenalty
      properties:
        threshold:
          type: number
          description: Metric value limit. Breach starts when value exceeds this.
        alertDelay:
          type: number
          description: Seconds of continuous breach required to count 1 violation.
          minimum: 0
        warningPenalty:
          type: number
          description: Number of violations required to count 1 anomaly/punishment.
          minimum: 1

    DirectorThresholdsResponse:
      type: object
      required:
        - thresholds
      properties:
        thresholds:
          type: object
          description: Per-metric threshold configuration keyed by metric name.
          additionalProperties:
            $ref: '#/components/schemas/DirectorThresholdMetric'
        updatedAt:
          type: string
          format: date-time
          description: ISO-8601 timestamp of last update. Absent if never explicitly saved.

    DirectorThresholdsUpdateRequest:
      type: object
      required:
        - thresholds
      properties:
        thresholds:
          type: object
          description: Full replacement set of per-metric threshold configuration.
          additionalProperties:
            $ref: '#/components/schemas/DirectorThresholdMetric'

    DirectorRefreshRateResponse:
      type: object
      required:
        - refreshRateHz
      properties:
        refreshRateHz:
          type: number
          minimum: 0.1
          description: Runtime telemetry sampling rate in Hertz used by Director Graph.
        updatedAt:
          type: string
          format: date-time

    DirectorRefreshRateUpdateRequest:
      type: object
      required:
        - refreshRateHz
      properties:
        refreshRateHz:
          type: number
          minimum: 0.1
          description: New runtime telemetry sampling rate in Hertz.

    DirectorRefreshRateWriteResponse:
      type: object
      required:
        - saved
        - refreshRateHz
      properties:
        saved:
          type: boolean
          const: true
        refreshRateHz:
          type: number
          minimum: 0.1
        updatedAt:
          type: string
          format: date-time

    WriteSuccessResponse:
      type: object
      required:
        - saved
      properties:
        saved:
          type: boolean
          const: true
        updatedAt:
          type: string
          format: date-time

    FleetResponse:
      type: object
      required:
        - cars
      properties:
        cars:
          type: array
          items:
            $ref: '#/components/schemas/Car'

