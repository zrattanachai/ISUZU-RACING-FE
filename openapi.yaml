                        w: 1
                        h: 4
                      - i: speed_rpm
                        x: 3
                        y: 4
                        w: 1
                        h: 2.3
                    hiddenWidgets:
                      - stress
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Preferences
      summary: Save engineering layout preferences
      description: Persists the Engineering dashboard layout and hidden widgets for a user.
      operationId: updateEngineeringLayout
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EngineeringLayoutRequest'
            examples:
              default:
                value:
                  layout:
                    - i: alerts
                      x: 0
                      y: 0
                      w: 1
                      h: 4
                    - i: speed_rpm
                      x: 3
                      y: 4
                      w: 1
                      h: 2.3
                  hiddenWidgets:
                    - stress
      responses:
        '200':
          description: Engineering layout preferences saved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineeringLayoutResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

