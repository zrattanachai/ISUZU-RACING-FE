  /reports/logs/export:
    get:
      tags:
        - Reports
      summary: Export telemetry log report CSV
      description: Exports the same filtered report query as CSV.
      operationId: exportLogReportCsv
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: car
          in: query
