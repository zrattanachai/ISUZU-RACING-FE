openapi: 3.1.0
info:
  title: Race Control Dashboard API
  version: 1.0.0
  description: API contract for the ISUZU Racing frontend and local mock server integration.
servers:
  - url: http://localhost:4001
paths:
  /fleet:
    get:
      tags:
        - Fleet
      summary: Get fleet summary
      description: Returns the active fleet used to populate the vehicle selector.
      operationId: getFleet
      responses:
        '200':
          description: Fleet summary returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FleetResponse'
              examples:
                default:
                  value:
                    cars:
                      - id: 12
                        number: '12'
                        model: Isuzu D-Max Proto
                        status: Active
                        color: '#ff1744'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /drivers:
    get:
      tags:
        - Fleet
      summary: Get driver assignments
      description: Returns driver records for the requested car IDs.
      operationId: getDrivers
      parameters:
        - name: carIds
          in: query
          required: true
          description: Comma-separated car IDs.
          schema:
            type: string
            examples:
              - 1,2,3
      responses:
        '200':
          description: Driver assignments returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverListResponse'
              examples:
                default:
                  value:
                    drivers:
                      - id: 8
                        name: Driver 12
                        carId: 12
                        license: FIA-A
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /director/thresholds:
    get:
      tags:
        - Director
      summary: Get director anomaly thresholds
      description: |
        Returns the current per-metric threshold configuration used by the
        backend anomaly engine. Configured in the Administration page
        (THRESHOLDS tab) and held in the mock server runtime.
      operationId: getDirectorThresholds
      responses:
        '200':
          description: Current threshold configuration returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectorThresholdsResponse'
              examples:
                default:
                  value:
                    thresholds:
                      rpm:
                        { threshold: 9000, alertDelay: 1.0, warningPenalty: 3 }
                      speed:
                        { threshold: 300, alertDelay: 2.0, warningPenalty: 5 }
                      fuelPressure:
                        { threshold: 5.0, alertDelay: 1.0, warningPenalty: 3 }
                      boost:
                        { threshold: 2.8, alertDelay: 1.0, warningPenalty: 3 }
                      throttle:
                        { threshold: 95, alertDelay: 1.0, warningPenalty: 3 }
                      ignitionTiming:
                        { threshold: 38, alertDelay: 1.0, warningPenalty: 3 }
                      lambda:
                        { threshold: 1.05, alertDelay: 1.0, warningPenalty: 3 }
                      airflow:
                        { threshold: 380, alertDelay: 1.0, warningPenalty: 3 }
                    updatedAt: '2026-03-17T08:00:00Z'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Director
      summary: Update director anomaly thresholds
      description: |
        Replaces the full set of per-metric thresholds used by the backend
        anomaly engine. Called from the Administration page when the operator
        saves the THRESHOLDS tab. The backend must apply new values
        immediately — the next anomaly evaluation cycle will use them.
      operationId: updateDirectorThresholds
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DirectorThresholdsUpdateRequest'
            examples:
              default:
                value:
                  thresholds:
                    rpm:
                      { threshold: 10000, alertDelay: 3.0, warningPenalty: 3 }
                    speed:
                      { threshold: 300, alertDelay: 2.0, warningPenalty: 5 }
                    fuelPressure:
                      { threshold: 5.0, alertDelay: 1.0, warningPenalty: 3 }
                    boost:
                      { threshold: 2.8, alertDelay: 1.0, warningPenalty: 3 }
                    throttle:
                      { threshold: 95, alertDelay: 1.0, warningPenalty: 3 }
                    ignitionTiming:
                      { threshold: 38, alertDelay: 1.0, warningPenalty: 3 }
                    lambda:
                      { threshold: 1.05, alertDelay: 1.0, warningPenalty: 3 }
                    airflow:
                      { threshold: 380, alertDelay: 1.0, warningPenalty: 3 }
      responses:
        '200':
          description: Thresholds updated. Backend engine will use new values immediately.
          content:
            application/json:
              schema:
                type: object
                required:
                  - saved
                properties:
                  saved:
                    type: boolean
                    const: true
                  updatedAt:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /director/refresh-rate:
    get:
      tags:
        - Director
      summary: Get director graph refresh rate
      description: |
        Returns the current runtime sampling rate used by the Director Graph.
        The frontend loads this value into shared platform state on startup.
      operationId: getDirectorRefreshRate
      responses:
        '200':
          description: Current refresh rate returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectorRefreshRateResponse'
              examples:
                default:
                  value:
                    refreshRateHz: 5
                    updatedAt: '2026-04-07T09:30:00Z'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Director
      summary: Update director graph refresh rate
      description: |
        Replaces the runtime sampling rate used by the Director Graph.
        Called from the Administration page when the operator selects a
        refresh-rate preset.
      operationId: updateDirectorRefreshRate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DirectorRefreshRateUpdateRequest'
            examples:
              default:
                value:
                  refreshRateHz: 10
      responses:
        '200':
          description: Refresh rate updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectorRefreshRateWriteResponse'
              examples:
                default:
                  value:
                    saved: true
                    refreshRateHz: 10
                    updatedAt: '2026-04-07T09:31:00Z'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

