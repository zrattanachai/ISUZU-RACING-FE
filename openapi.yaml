  /engineering/cars/{carId}/recordings:
    post:
      tags:
        - Engineering
      summary: Create car-scoped recording session
      description: |
        Convenience entrypoint used by Engineering and Director pages.
        The frontend supplies the target car in the path plus the requested
        recording time range and destination folder. The backend owns file
        generation, storage placement, and later exposes the resulting session
        via GET /recordings for the File & Video page.
      operationId: createEngineeringRecording
      parameters:
        - $ref: '#/components/parameters/CarIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScopedRecordingRequest'
            examples:
              default:
                value:
                  sessionName: Buriram_Race_Session_01
                  startDate: '2026-03-16T10:00:00Z'
                  endDate: '2026-03-16T11:30:00Z'
                  targetFolderId: root
      responses:
        '201':
          description: Recording session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordingSession'
              examples:
                default:
                  value:
                    id: rec-1742135237
                    vehicleId: 12
                    sessionName: Buriram_Race_Session_01
                    startDate: '2026-03-16T10:00:00Z'
                    endDate: '2026-03-16T11:30:00Z'
                    targetFolderId: root
                    status: processing
                    fileCount: 13
                    createdAt: '2026-03-16T10:42:01Z'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # -------------------------------------------------------------------------
  # Historical Telemetry
  # -------------------------------------------------------------------------
  /telemetry/history:
    get:
      tags:
        - Telemetry
      summary: Get historical telemetry
      description: |
        Returns a time-ordered list of telemetry frames for a vehicle within
        a date/time range. Intended for Director page lap comparison and
        Files page CSV export. Realtime frames are delivered via WebSocket.
      operationId: getTelemetryHistory
      parameters:
        - name: vehicleId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
          example: 12
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date-time
          example: '2026-03-16T10:00:00Z'
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date-time
          example: '2026-03-16T11:00:00Z'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 10000
            default: 1000
      responses:
        '200':
          description: Historical telemetry returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryHistoryResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # -------------------------------------------------------------------------
  # Alert Thresholds
  # -------------------------------------------------------------------------
  /alert-thresholds:
    get:
      tags:
        - Alert Thresholds
      summary: Get alert thresholds
      description: Returns all configured alert thresholds. Used by the Settings page and all sensor pages.
      operationId: getAlertThresholds
      responses:
        '200':
          description: Alert thresholds returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertThresholdsResponse'
              examples:
                default:
                  value:
                    thresholds:
                      - id: engineTemp
                        metric: engineTemp
                        label: Engine Temp
                        unit: '°C'
                        warningValue: 105
                        criticalValue: 120
                      - id: oilPressure
                        metric: oilPressure
                        label: Oil Pressure
                        unit: bar
                        warningValue: 1.5
                        criticalValue: 1.0
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Alert Thresholds
      summary: Update alert thresholds
      description: Replaces the full set of alert thresholds. Send every threshold including unchanged ones.
      operationId: updateAlertThresholds
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertThresholdsUpdateRequest'
      responses:
        '200':
          description: Alert thresholds updated successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - saved
                properties:
                  saved:
                    type: boolean
                    const: true
                  updatedAt:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # -------------------------------------------------------------------------
  # Recording Sessions
  # -------------------------------------------------------------------------
  /recordings:
    get:
      tags:
        - Recordings
      summary: List recording sessions
      description: |
        Returns recording sessions for the File & Video page.
        Each session tells the UI which car and time range were requested,
        where the backend will store the output, and whether a storage download
        URL is already available.
      operationId: listRecordings
      parameters:
        - name: vehicleId
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Recordings returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordingListResponse'
              examples:
                default:
                  value:
                    recordings:
                      - id: rec-1742135237
                        vehicleId: 12
                        sessionName: Buriram_Race_Session_01
                        startDate: '2026-03-16T10:00:00Z'
                        endDate: '2026-03-16T11:30:00Z'
                        targetFolderId: root
                        status: ready
                        fileCount: 4
                        createdAt: '2026-03-16T10:42:01Z'
                        downloadUrl: https://storage.example.com/recordings/rec-1742135237.zip?signature=demo
                        archiveFileName: Buriram_Race_Session_01.zip
                      - id: rec-1742135401
                        vehicleId: 18
                        sessionName: Director_Incident_Window
                        startDate: '2026-03-16T11:31:00Z'
                        endDate: '2026-03-16T11:36:00Z'
                        targetFolderId: incident-review
                        status: processing
                        fileCount: 0
                        createdAt: '2026-03-16T11:36:05Z'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Recordings
      summary: Create recording session
      description: |
        Triggers a new backend-managed recording job. The frontend sends the
        selected vehicle, requested time range, and destination folder only.
        The backend performs file generation, writes to storage, and later
        exposes the session through GET /recordings and a downloadable URL.
      operationId: createRecording
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecordingRequest'
            examples:
              default:
                value:
                  vehicleId: 12
                  sessionName: Buriram_Race_Session_01
                  startDate: '2026-03-16T10:00:00Z'
                  endDate: '2026-03-16T11:30:00Z'
                  targetFolderId: root
      responses:
        '201':
          description: Recording session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordingSession'
              examples:
                default:
                  value:
                    id: rec-1742135237
                    vehicleId: 12
                    sessionName: Buriram_Race_Session_01
                    startDate: '2026-03-16T10:00:00Z'
                    endDate: '2026-03-16T11:30:00Z'
                    targetFolderId: root
                    status: processing
                    fileCount: 0
                    createdAt: '2026-03-16T10:42:01Z'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /recordings/start:
    post:
      tags:
        - Recordings
      summary: Start browser recording session
      description: |
        Creates a lightweight recording session before the browser screen-share
        capture starts. The frontend later PATCHes metadata and uploads the
        captured blob to this recording id.
      operationId: startRecording
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordingStartRequest'
            examples:
              default:
                value:
                  vehicleId: 1
                  sessionName: Engineering_Car_01_Screen_Record
      responses:
        '201':
          description: Recording session started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordingStartResponse'
              examples:
                default:
                  value:
                    id: rec-1742135237
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /recordings/{recordingId}:
    patch:
      tags:
        - Recordings
      summary: Patch recording metadata
      description: Updates session metadata such as name, time range, status, source page, or target folder.
      operationId: patchRecording
      parameters:
        - name: recordingId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordingPatchRequest'
            examples:
              default:
                value:
                  sessionName: Engineering_Car_01_Screen_Record
                  endDate: '2026-03-16T10:15:00Z'
                  targetFolderId: event-1
                  status: processing
      responses:
        '200':
          description: Recording updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordingSession'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /recordings/{recordingId}/upload:
    post:
      tags:
        - Recordings
      summary: Upload browser recording blob
      description: Uploads the captured browser recording as multipart form data.
      operationId: uploadRecording
      parameters:
        - name: recordingId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                targetFolderId:
                  type: string
      responses:
        '201':
          description: Recording upload accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordingUploadResponse'
              examples:
                default:
                  value:
                    uploaded: true
                    recordingId: rec-1742135237
                    file:
                      id: upload-1742135237
                      parentId: event-1
                      name: Engineering_Car_01_Screen_Record.mp4
                      type: mp4
                      size: 18 MB
                      date: '2026-03-16T10:15:00Z'
                      downloadUrl: https://storage.example.com/recordings/Engineering_Car_01_Screen_Record.mp4?signature=demo
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /recordings/{recordingId}/download:
    get:
      tags:
        - Recordings
      summary: Resolve recording download URL
      description: |
        Returns the backend-generated storage URL for a completed recording.
        The backend remains responsible for file generation and storage; the
        frontend only opens the returned URL.
      operationId: downloadRecording
      parameters:
        - name: recordingId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Download URL resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordingDownloadResponse'
              examples:
                ready:
                  value:
                    recordingId: rec-1742135237
                    status: ready
                    url: https://storage.example.com/recordings/rec-1742135237.zip?signature=demo
                    expiresAt: '2026-03-16T12:45:00Z'
                    fileName: Buriram_Race_Session_01.zip
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          description: Recording is not yet ready for download.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /files/tree:
    get:
      tags:
        - Files
      summary: Get file hierarchy tree
      description: |
        Returns the backend-managed File & Video hierarchy as a flat list of
        nodes linked by `parentId`. This is the source of truth for the vault
        tree shown in the frontend.
      operationId: getFileTree
      responses:
        '200':
          description: File hierarchy returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileTreeResponse'
              examples:
                default:
                  value:
                    files:
                      - id: event-1
                        parentId: root
                        name: Buriram GT3 Series
                        type: folder
                        date: '2026-03-16T10:00:00Z'
                      - id: rec-folder-1742135237
                        parentId: event-1
                        name: Buriram_Race_Session_01
                        type: folder
                        date: '2026-03-16T10:42:01Z'
                      - id: rec-zip-1742135237
                        parentId: rec-folder-1742135237
                        name: Buriram_Race_Session_01.zip
                        type: zip
                        size: 412 MB
                        date: '2026-03-16T10:45:00Z'
                        downloadUrl: https://storage.example.com/recordings/rec-1742135237.zip?signature=demo
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /files/folder:
    post:
      tags:
        - Files
      summary: Create file folder
      description: Creates a folder in the backend-managed File & Video hierarchy.
      operationId: createFileFolder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFolderRequest'
            examples:
              default:
                value:
                  name: Incident Review
                  parentId: root
      responses:
        '201':
          description: Folder created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateFolderResponse'
              examples:
                default:
                  value:
                    id: folder-1742135237
                    file:
                      id: folder-1742135237
                      parentId: root
                      name: Incident Review
                      type: folder
                      date: '2026-03-16T10:15:00Z'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /files/import:
    post:
      tags:
        - Files
      summary: Import telemetry CSV file
      description: |
        Imports an uploaded telemetry CSV into the backend-managed File & Video
        hierarchy. The frontend reads the local CSV file and sends its text
        content through the authenticated Route Handler proxy.
      operationId: importTelemetryCsv
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportFileRequest'
            examples:
              default:
                value:
                  fileName: telemetry-session.csv
                  csvContent: "timestamp,vehicleId,speed,rpm\n2026-03-16T10:00:00Z,12,210,7400"
      responses:
        '201':
          description: CSV file imported successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportFileResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /files/{fileId}:
    delete:
      tags:
        - Files
      summary: Delete file or folder command
      description: |
        Sends a delete command to the backend for a file or folder. Folder
        deletion is recursive and the backend is responsible for removing any
        related recording session metadata and storage objects.
      operationId: deleteFileNode
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteFileRequest'
            examples:
              default:
                value:
                  password: Admin@123
      responses:
        '200':
          description: Delete command completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteFileResponse'
              examples:
                default:
                  value:
                    deletedIds:
                      - rec-folder-1742135237
                      - rec-zip-1742135237
                    deletedRecordingIds:
                      - rec-1742135237
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Invalid delete password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # -------------------------------------------------------------------------
  # Reports
  # -------------------------------------------------------------------------
  /reports/logs:
    get:
      tags:
        - Reports
      summary: Query telemetry log report
      description: |
        Queries telemetry rows from tb.log-style storage. Scoped roles should
        send only the assigned `car` filter; the frontend no longer sends a
        device filter.
      operationId: queryLogReport
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: car
          in: query
          required: false
          description: Car number such as `01`; required by scoped Engineer and Competitor roles.
          schema:
            type: string
            example: '01'
        - name: name
          in: query
          required: false
          schema:
            type: string
            example: Bira International Circuit
        - name: event
          in: query
          required: false
          schema:
            type: string
            example: pt
        - name: className
          in: query
          required: false
          schema:
            type: string
            example: isuzu-omr
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum: [datetime, createTime]
            default: datetime
        - name: sortOrder
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
